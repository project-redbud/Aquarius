<div class="page">
  <h1>📝 注册</h1>

  <div class="form">
    <input
      type="text"
      [(ngModel)]="username"
      placeholder="用户名（至少2个字符）"
      (keydown.enter)="onSubmit()"
      autocomplete="username"
    />
    <input
      type="email"
      [(ngModel)]="email"
      placeholder="电子邮件地址"
      (keydown.enter)="onSubmit()"
      autocomplete="email"
    />
    <input
      type="password"
      [(ngModel)]="password"
      placeholder="密码（至少6个字符）"
      (keydown.enter)="onSubmit()"
      autocomplete="new-password"
    />
    <input
      type="password"
      [(ngModel)]="confirmPassword"
      placeholder="确认密码"
      (keydown.enter)="onSubmit()"
      autocomplete="new-password"
    />

    @if (error()) {
      <div class="error">{{ error() }}</div>
    }

    <button class="primary" [disabled]="loading()" (click)="onSubmit()">
      {{ loading() ? '注册中...' : '注册' }}
    </button>

    <p class="switch">
      已有账号？<a routerLink="/login">登录</a>
    </p>
  </div>
</div>
