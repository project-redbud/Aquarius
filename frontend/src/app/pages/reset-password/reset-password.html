<div class="page">
  <h1>🔑 重置密码</h1>

  @if (status() === 'error') {
    <div class="error-box">
      <h2>❌ {{ message() }}</h2>
      <p><a routerLink="/login">→ 前往登录</a></p>
    </div>
  } @else if (status() === 'success') {
    <div class="success-box">
      <h2>✅ {{ message() }}</h2>
      <p>即将跳转到登录页...</p>
      <p><a routerLink="/login">→ 前往登录</a></p>
    </div>
  } @else {
    <div class="form">
      <input
        type="password"
        [(ngModel)]="newPassword"
        placeholder="新密码（至少6个字符）"
        (keydown.enter)="onSubmit()"
        autocomplete="new-password"
      />
      <input
        type="password"
        [(ngModel)]="confirmPassword"
        placeholder="确认新密码"
        (keydown.enter)="onSubmit()"
        autocomplete="new-password"
      />

      @if (message()) {
        <div class="error">{{ message() }}</div>
      }

      <button class="primary" [disabled]="status() === 'loading'" (click)="onSubmit()">
        {{ status() === 'loading' ? '重置中...' : '重置密码' }}
      </button>
    </div>
  }
</div>
