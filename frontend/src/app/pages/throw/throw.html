<div class="page">
  <h1>🫧 投一只瓶</h1>

  @if (!isLoggedIn()) {
    <div class="login-gate">
      <p>🔒 请先<a routerLink="/login">登录</a>后再投瓶</p>
      <p class="hint">还没有账号？<a routerLink="/register">注册</a></p>
    </div>
  }

  <textarea
    [(ngModel)]="content"
    placeholder="写下你想说的话（最多500字）..."
    maxlength="500"
    rows="5"
  ></textarea>

  <!-- image -->
  <div class="image-area">
    @if (!imageBase64()) {
      <label class="upload-btn">
        @if (compressing()) {
          ⏳ 压缩中...
        } @else {
          📷 添加图片（可选，仅一张）
        }
        <input type="file" accept="image/*" (change)="onFileChange($event)" hidden [disabled]="compressing()" />
      </label>
    } @else {
      <div class="preview">
        <img [src]="imageBase64()!" alt="preview" />
        <button class="remove" (click)="removeImage()">✕ 移除</button>
      </div>
    }
  </div>

  <!-- author -->
  <div class="author-row">
    <label>
      <input type="checkbox" [(ngModel)]="isAnonymous" />
      匿名发布
    </label>
    @if (!isAnonymous()) {
      <input
        type="text"
        [(ngModel)]="authorName"
        placeholder="留个名字（选填）"
        maxlength="50"
      />
    }
  </div>

  <!-- privacy options -->
  <div class="privacy-row">
    <label>
      <input type="checkbox" [(ngModel)]="requireLogin" />
      🔒 登录可见 <span class="hint">未登录用户捞不到此瓶</span>
    </label>
    <label>
      <input type="checkbox" [(ngModel)]="commentsPrivate" />
      🛡️ 评论仅瓶主可见 <span class="hint">非瓶主看不到评论</span>
    </label>
  </div>

  @if (auth.isAdmin()) {
    <div class="admin-badge-row">
      <label>
        <input type="checkbox" [(ngModel)]="showAdminBadge" />
        🛡️ 管理员标识 <span class="hint">作者名旁显示管理员图标</span>
      </label>
    </div>
  }

  <button class="primary" [disabled]="!content().trim() || sending() || !isLoggedIn()" (click)="throwBottle()">
    {{ sending() ? '投掷中...' : !isLoggedIn() ? '请先登录' : '🫧 投出去' }}
  </button>
</div>
