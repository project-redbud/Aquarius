<div class="page">
  <h1>📧 邮箱验证</h1>

  @if (status() === 'loading') {
    <div class="loading">正在验证...</div>
  } @else if (status() === 'success') {
    <div class="success-box">
      <h2>✅ {{ message() }}</h2>
      <p>即将跳转到首页...</p>
      <p><a routerLink="/pick">→ 前往首页</a></p>
    </div>
  } @else {
    <div class="error-box">
      <h2>❌ {{ message() }}</h2>
      <p><a routerLink="/login">→ 前往登录</a></p>
    </div>
  }
</div>
