<div class="page"
  (touchstart)="onTouchStart($event)"
  (touchmove)="onTouchMove($event)"
  (touchend)="onTouchEnd()"
>
  @if (pullDistance() > 0) {
    <div class="pull-indicator" [style.height.px]="pullDistance()">
      {{ pullDistance() > 60 ? '✨ 松开刷新' : '↓ 下拉刷新' }}
    </div>
  }

  <div class="header-row">
    <h1>🌊 捞瓶</h1>
    <button class="next-btn" (click)="pickBottle()" [disabled]="loading()">
      {{ loading() ? '捞取中...' : '🔄 下一只' }}
    </button>
  </div>

  @if (refreshing()) { <div class="loading">刷新中...</div> }
  @else if (!bottle()) {
    <div class="empty"><p>海里还没有瓶子 🫙</p><button class="primary" (click)="pickBottle()">再捞一次</button></div>
  } @else {
    <app-bottle-view [bottle]="bottle()" [loading]="false"></app-bottle-view>
  }
</div>
